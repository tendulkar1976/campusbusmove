  <body>
    <div id="root">
      <!-- Premium CSS Initial Loader -->
      <style>
        .initial-loader-wrapper {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background-color: #0d0d11;
          color: #ffffff;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          z-index: 99999;
        }
        .initial-loader-icon {
          font-size: 42px;
          animation: initial-bus-pulse 1.6s ease-in-out infinite alternate;
          margin-bottom: 20px;
        }
        .initial-loader-line {
          width: 120px;
          height: 3px;
          background-color: rgba(255, 255, 255, 0.1);
          border-radius: 2px;
          overflow: hidden;
          position: relative;
        }
        .initial-loader-bar {
          height: 100%;
          width: 40%;
          background-color: #FF5A1F;
          border-radius: 2px;
          position: absolute;
          animation: initial-loading-swipe 1.2s ease-in-out infinite alternate;
        }
        .initial-loader-text {
          font-size: 11px;
          font-weight: 700;
          color: #FF5A1F;
          letter-spacing: 1.5px;
          text-transform: uppercase;
          margin-top: 14px;
        }
        @keyframes initial-bus-pulse {
          0% { transform: translateY(0) scale(1); }
          100% { transform: translateY(-4px) scale(1.05); }
        }
        @keyframes initial-loading-swipe {
          from { left: -10%; }
          to { left: 70%; }
        }
      </style>
      <div class="initial-loader-wrapper">
        <div class="initial-loader-icon">🚌</div>
        <div class="initial-loader-line">
          <div class="initial-loader-bar"></div>
        </div>
        <div class="initial-loader-text">CampusMove</div>
      </div>
    </div>
  </body>
